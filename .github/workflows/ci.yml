name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 25
      - uses: bytecodealliance/actions/wasm-tools/setup@v1
        with:
          version: '1.245.1'
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - run: npm test
